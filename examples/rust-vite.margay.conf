# examples/rust-vite.margay.conf — a monorepo with a Rust API + Vite frontend.
# Copy into your repo's PRIMARY checkout as `.margay.conf` and adjust names,
# ports, and the postgres recipe. The file is machine-local: never commit it
# (install.sh guards it in your global gitignore).
project="acme"
services="api web"
env_file=".env.dev"                        # optional; sourced (set -a) from the PRIMARY checkout

postgres_psql() { docker exec -i acme-pg psql -U acme "$@"; }
postgres_url="postgres://acme:acme@localhost:5432/{db}"

service_api_ports="8285-8294"
service_api_db="empty"                     # none (default) | empty | seed
service_api_start() {                      # cwd = worktree; PORT, DB_NAME, DB_URL exported
  export BIND_ADDR="127.0.0.1:$PORT" DATABASE_URL="$DB_URL"
  exec cargo run --release
}

service_web_ports="5283-5289"
service_web_needs="api"                    # API_PORT / API_URL injected at start
service_web_start() {
  export VITE_API_PROXY_TARGET="$API_URL"
  # pnpm run does not forward --port through to vite — invoke vite directly.
  cd frontend && exec pnpm exec vite --port "$PORT" --strictPort
}
