# .margay.conf — local margay config, never committed (global-gitignored)
project="spendprism"
services="web"
env_file=".env"

service_web_ports="5273-5277"     # historical Keycloak redirect-URI band; harmless now
service_web_uses_project="spendprism:backend"
service_web_uses_optional=1       # no backend → VITE_MOCK_BOOKING (MSW) below
service_web_main_port=8090
service_web_start() {
  cat > .env.local <<'EOF'
# generated by margay — gitignored, safe to delete
VITE_API_URL=/api
EOF
  # The primary .env pins VITE_OIDC_REDIRECT_URI and margay sources it (set -a),
  # so it sits in PROCESS env — where Vite gives it top priority over .env.local.
  # Export it EMPTY (falsy) so the app falls back to window.location.origin and
  # the OIDC round-trip keeps the per-worktree proxy URL. Dev realm must allow
  # it: Valid redirect URIs *, post-logout +, Web origins *.
  export VITE_OIDC_REDIRECT_URI=""
  if [[ -z "${BACKEND_URL:-}" ]]; then
    export VITE_MOCK_BOOKING=1            # mock mode: MSW + fixtures, no backend
  else
    export VITE_API_URL=/api API_PROXY_TARGET="$BACKEND_URL"
  fi
  exec pnpm exec vite --port "$PORT" --strictPort
}

# Register this sandbox's proxy origins as Keycloak redirect URIs so OIDC
# logins return to the per-worktree URL without a wildcard in the realm.
# Idempotent; margay only warns if it fails (e.g. Keycloak container down).
service_web_on_up() {
  local kc="docker exec spendprism-keycloak /opt/keycloak/bin/kcadm.sh"
  local cid="707bb781-1b80-4c42-af58-280663335dac" realm="spendprism"
  $kc config credentials --server http://localhost:8080 --realm master \
      --user admin --password admin >/dev/null 2>&1 || return 1
  local cur; cur="$($kc get "clients/$cid" -r "$realm" --fields redirectUris \
      2>/dev/null | jq -r '.redirectUris[]')" || return 1
  local want merged="$cur" changed=0
  for want in "http://$MARGAY_ROOT_HOST/*" "http://$MARGAY_SERVICE_HOST/*"; do
    grep -qxF "$want" <<<"$cur" || { merged+=$'\n'"$want"; changed=1; }
  done
  (( changed )) || return 0
  $kc update "clients/$cid" -r "$realm" \
      -s "redirectUris=$(jq -cn --arg s "$merged" '$s | split("\n")')" >/dev/null \
    && echo "  keycloak: registered http://$MARGAY_SERVICE_HOST/"
}
