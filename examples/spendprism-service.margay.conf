# .margay.conf — local margay config, never committed (global-gitignored)
project="spendprism"
services="backend"
env_file=".env"

postgres_psql() { (cd "$MARGAY_PRIMARY" && docker compose exec -T database psql -U "$POSTGRES_USER" "$@"); }
postgres_dump() { (cd "$MARGAY_PRIMARY" && docker compose exec -T database pg_dump -U "$POSTGRES_USER" "$@"); }
postgres_url="postgres://localhost:5433/{db}"
postgres_seed_from="spendprism"

service_backend_ports="8190-8199"
service_backend_db="seed"
service_backend_start() {
  # JDK via mise: margay launches services in non-interactive shells where
  # `mise activate` never ran, so resolve the toolchain-pinned JDK explicitly
  # (honors the repo's mise.toml). Harmless no-op on machines without mise.
  if command -v mise >/dev/null 2>&1; then
    export JAVA_HOME="$(mise where java 2>/dev/null)"
    [[ -n "$JAVA_HOME" ]] && export PATH="$JAVA_HOME/bin:$PATH"
  fi
  export SERVER_PORT="$PORT" POSTGRES_DB="$DB_NAME"
  # margay owns the DB: switch off spring-boot-docker-compose (it would start a
  # per-worktree Postgres and override the datasource) and point at the shared
  # container's published port explicitly.
  export SPRING_DOCKER_COMPOSE_ENABLED=false
  export DB_HOST="localhost" DB_PORT="5433"
  export GEMINI_API_KEY="${GEMINI_API_KEY:-local-dev-placeholder}"
  # --no-daemon so the exported env reaches the forked app JVM.
  exec ./gradlew bootRun --no-daemon
}
