<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>margay</title>
<style>
  :root { --fg:#1a1a1a; --muted:#777; --bg:#f6f6f4; --card:#fff; --line:#e2e2de;
          --accent:#0b6e4f; --danger:#a33; }
  @media (prefers-color-scheme: dark) {
    :root { --fg:#e8e8e6; --muted:#999; --bg:#161615; --card:#1f1f1e;
            --line:#333; --accent:#4dbd95; --danger:#e07a7a; }
  }
  * { box-sizing: border-box; }
  body { margin:0; padding:1.5rem; background:var(--bg); color:var(--fg);
         font:14px/1.5 ui-sans-serif, system-ui, sans-serif; }
  h1 { font-size:1.1rem; margin:0 0 1rem; }
  h1 small { color:var(--muted); font-weight:normal; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:8px;
          margin-bottom:1rem; overflow:hidden; }
  .card.stale { opacity:.55; }
  .card-h { display:flex; align-items:baseline; gap:.6rem; padding:.6rem .9rem;
            border-bottom:1px solid var(--line); }
  .card-h b { font-size:1rem; }
  .card-h .path { color:var(--muted); font-family:ui-monospace,monospace; font-size:.8rem;
                  flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .wt { padding:.55rem .9rem; border-bottom:1px solid var(--line); }
  .wt:last-child { border-bottom:none; }
  .wt-row { display:flex; align-items:center; gap:.7rem; flex-wrap:wrap; }
  .branch { font-family:ui-monospace,monospace; font-weight:600; }
  .wtpath { color:var(--muted); font-family:ui-monospace,monospace; font-size:.78rem; }
  .svc { display:flex; align-items:center; gap:.6rem; margin:.25rem 0 0 1rem;
         font-family:ui-monospace,monospace; font-size:.82rem; }
  .svc a { color:var(--accent); }
  .dim { color:var(--muted); }
  button { font:inherit; border:1px solid var(--line); background:transparent;
           color:var(--fg); border-radius:5px; padding:.15rem .6rem; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  button.up { color:var(--accent); }
  button.down { color:var(--danger); }
  button.x { border:none; color:var(--muted); padding:.15rem .3rem; }
  .spin { color:var(--muted); font-style:italic; }
  pre.pane { background:var(--bg); border:1px solid var(--line); border-radius:5px;
             margin:.4rem 0 0; padding:.5rem; max-height:20rem; overflow:auto;
             font-size:.75rem; white-space:pre-wrap; word-break:break-all; }
  label.follow { font-size:.75rem; color:var(--muted); margin-left:.5rem; }
  .empty { color:var(--muted); padding:2rem; text-align:center; }
</style>
</head>
<body>
<h1>margay <small>— worktree sandboxes</small></h1>
<main id="app"><div class="empty">loading…</div></main>
<script>
"use strict";
const esc = s => String(s).replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const openLogs = new Map();   // log path -> {offset, buf, follow}
const openOut  = new Map();   // worktreePath -> last up/down output
const busy     = new Set();   // worktreePaths with an in-flight up/down
let lastState  = {projects: []};

async function api(path, body) {
  const opts = body === undefined ? {} :
    { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) };
  const r = await fetch(path, opts);
  let data = {};
  try { data = await r.json(); } catch (e) { /* keep {} */ }
  return { status: r.status, data };
}

async function refresh() {
  try {
    const { data } = await api('/api/state');
    lastState = data;
    render();
  } catch (e) { /* server gone; keep last view */ }
}

async function act(cmd, wt) {
  busy.add(wt); openOut.delete(wt); render();
  const { data } = await api('/api/' + cmd, { worktreePath: wt });
  busy.delete(wt);
  openOut.set(wt, data.output || '(no output)');
  await refresh();
}

async function unregister(p) {
  await api('/api/unregister', { primaryPath: p });
  await refresh();
}

function toggleLog(path) {
  if (openLogs.has(path)) openLogs.delete(path);
  else openLogs.set(path, { offset: -1, buf: '', follow: true });
  render();
}

async function pollLogs() {
  for (const [path, st] of openLogs) {
    try {
      const { status, data } =
        await api(`/api/log?file=${encodeURIComponent(path)}&offset=${st.offset}`);
      if (status !== 200) continue;
      if (data.offset < st.offset) st.buf = data.data;   // truncated: restart
      else st.buf += data.data;
      if (st.buf.length > 262144) st.buf = st.buf.slice(-262144);
      st.offset = data.offset;
      const pre = document.querySelector(`pre[data-log="${CSS.escape(path)}"]`);
      if (pre) {
        pre.textContent = st.buf;
        if (st.follow) pre.scrollTop = pre.scrollHeight;
      }
    } catch (e) { /* next tick */ }
  }
}

function svcHtml(s) {
  const url = `http://localhost:${s.port}`;
  return `<div class="svc">
    <span>${esc(s.service)} → <a href="${url}" target="_blank">${url}</a></span>
    ${s.dbName ? `<span class="dim">db ${esc(s.dbName)}</span>` : ''}
    <span class="dim">pid ${s.pid}</span>
    ${s.log ? `<button onclick="toggleLog('${esc(s.log)}')">${openLogs.has(s.log) ? 'hide log' : 'log'}</button>` : ''}
  </div>
  ${s.log && openLogs.has(s.log) ? `
    <label class="follow"><input type="checkbox" ${openLogs.get(s.log).follow ? 'checked' : ''}
      onchange="openLogs.get('${esc(s.log)}').follow=this.checked"> follow</label>
    <pre class="pane" data-log="${esc(s.log)}">${esc(openLogs.get(s.log).buf)}</pre>` : ''}`;
}

function wtHtml(wt) {
  const running = wt.services.length > 0;
  const isBusy = busy.has(wt.path);
  return `<div class="wt">
    <div class="wt-row">
      <span class="branch">${esc(wt.branch)}</span>
      <span class="wtpath">${esc(wt.path)}</span>
      ${isBusy ? '<span class="spin">working…</span>'
        : running
          ? `<button class="down" onclick="act('down','${esc(wt.path)}')">down</button>`
          : `<button class="up" onclick="act('up','${esc(wt.path)}')">up</button>`}
    </div>
    ${wt.services.map(svcHtml).join('')}
    ${openOut.has(wt.path) ? `
      <details open><summary class="dim">command output</summary>
      <pre class="pane">${esc(openOut.get(wt.path))}</pre></details>` : ''}
  </div>`;
}

function render() {
  const app = document.getElementById('app');
  const ps = lastState.projects || [];
  if (!ps.length) {
    app.innerHTML = `<div class="empty">no projects yet — run <code>margay up</code> in a repo and it appears here</div>`;
    return;
  }
  app.innerHTML = ps.map(p => `
    <div class="card${p.exists ? '' : ' stale'}">
      <div class="card-h">
        <b>${esc(p.project)}</b>
        <span class="path">${esc(p.primaryPath)}${p.exists ? '' : ' (missing)'}</span>
        <button class="x" title="remove from this list (re-appears on next up)"
          onclick="unregister('${esc(p.primaryPath)}')">✕</button>
      </div>
      ${p.exists ? p.worktrees.map(wtHtml).join('') : ''}
    </div>`).join('');
}

refresh();
setInterval(refresh, 2000);
setInterval(pollLogs, 1500);
</script>
</body>
</html>
