# .margay.conf — local margay config, never committed (global-gitignored)
project="spendprism"
services="web"
env_file=".env"

service_web_ports="5273-5277"     # historical Keycloak redirect-URI band; harmless now
service_web_uses_project="spendprism:backend"
service_web_uses_optional=1       # no backend → VITE_MOCK_BOOKING (MSW) below
service_web_main_port=8090
service_web_start() {
  cat > .env.local <<'EOF'
# generated by margay — gitignored, safe to delete
VITE_API_URL=/api
EOF
  # The primary .env pins VITE_OIDC_REDIRECT_URI and margay sources it (set -a),
  # so it sits in PROCESS env — where Vite gives it top priority over .env.local.
  # Export it EMPTY (falsy) so the app falls back to window.location.origin and
  # the OIDC round-trip keeps the per-worktree proxy URL. Dev realm must allow
  # it: Valid redirect URIs *, post-logout +, Web origins *.
  export VITE_OIDC_REDIRECT_URI=""
  if [[ -z "${BACKEND_URL:-}" ]]; then
    export VITE_MOCK_BOOKING=1            # mock mode: MSW + fixtures, no backend
  else
    export VITE_API_URL=/api API_PROXY_TARGET="$BACKEND_URL"
  fi
  exec pnpm exec vite --port "$PORT" --strictPort
}
