<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>margay</title>
<style>
  :root { --fg:#1a1a1a; --muted:#777; --bg:#f6f6f4; --card:#fff; --line:#e2e2de;
          --accent:#0b6e4f; --danger:#a33; --panelbg:#f0f0ee; --sel:#e7efe9; }
  @media (prefers-color-scheme: dark) {
    :root { --fg:#e8e8e6; --muted:#999; --bg:#161615; --card:#1f1f1e;
            --line:#333; --accent:#4dbd95; --danger:#e07a7a; --panelbg:#101013; --sel:#22302a; }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body { margin:0; display:flex; flex-direction:column; background:var(--bg); color:var(--fg);
         font:14px/1.5 ui-sans-serif, system-ui, sans-serif; }
  h1 { font-size:1.05rem; margin:0; padding: .8rem 1.2rem .5rem; }
  h1 small { color:var(--muted); font-weight:normal; }
  #cols { flex:1; display:flex; min-height:0; border-top:1px solid var(--line); }
  #sidebar { width:250px; flex:none; overflow-y:auto; border-right:1px solid var(--line); }
  .proj-h { display:flex; align-items:baseline; gap:.4rem; padding:.55rem .9rem .25rem;
            font-size:.72rem; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
  .proj-h b { color:var(--fg); letter-spacing:0; text-transform:none; font-size:.85rem; }
  .svc-h { display:flex; align-items:center; gap:.4rem; padding:.35rem .9rem .1rem 1.1rem;
           font-size:.74rem; font-family:ui-monospace,monospace; color:var(--muted); }
  .svc-h .x { margin-left:auto; }
  .wt-row { display:flex; align-items:center; gap:.5rem; padding:.35rem .9rem .35rem 1.6rem; cursor:pointer; }
  .pair { color:var(--muted); font-weight:normal; font-family:ui-monospace,monospace; font-size:.68rem; }
  .pickrows { display:flex; flex-direction:column; gap:.4rem; margin:.8rem 0; max-width:26rem; }
  .pickrows button { text-align:left; padding:.35rem .7rem; font-family:ui-monospace,monospace; }
  .wt-row:hover { background:var(--panelbg); }
  .wt-row.sel { background:var(--sel); }
  .wt-row b { flex:1; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--line); flex:none; }
  .dot.on { background:var(--accent); }
  #detail { flex:1; display:flex; flex-direction:column; min-width:0; }
  #summary { padding:.9rem 1.2rem; overflow-y:auto; }
  #summary h2 { margin:0 0 .1rem; font-size:1.05rem; display:flex; align-items:center; gap:.7rem; }
  .branch { color:var(--muted); font-family:ui-monospace,monospace; font-size:.78rem; }
  .path { color:var(--muted); font-family:ui-monospace,monospace; font-size:.72rem; user-select:all; }
  .urls { margin:.7rem 0 .2rem; display:grid; grid-template-columns:max-content 1fr; gap:.15rem .8rem;
          font-family:ui-monospace,monospace; font-size:.8rem; }
  .urls .k { color:var(--muted); }
  .urls a { color:var(--accent); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .urls .hint { color:var(--muted); opacity:.7; }
  .meta { color:var(--muted); font-family:ui-monospace,monospace; font-size:.74rem; margin-top:.3rem; }
  .badge { font-size:.7rem; color:var(--danger); }
  button { font:inherit; border:1px solid var(--line); background:transparent;
           color:var(--fg); border-radius:5px; padding:.1rem .55rem; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  button.up { color:var(--accent); } button.down { color:var(--danger); }
  button.mini { font-size:.72rem; padding:0 .45rem; }
  button.x { border:none; color:var(--muted); }
  .spin { color:var(--muted); font-style:italic; font-size:.8rem; }
  .empty { color:var(--muted); padding:2rem; text-align:center; }
  #divider { height:5px; cursor:row-resize; flex:none; background:transparent; border-top:1px solid var(--line); }
  #logarea { flex:1; display:flex; flex-direction:column; background:var(--panelbg); min-height:0; }
  #logtabs { display:flex; align-items:center; border-bottom:1px solid var(--line); flex:none; overflow-x:auto; }
  .dtab { display:flex; align-items:center; gap:.4rem; padding:.25rem .7rem; font-size:.75rem;
          font-family:ui-monospace,monospace; color:var(--muted); border-right:1px solid var(--line);
          cursor:pointer; white-space:nowrap; }
  .dtab.act { color:var(--fg); background:var(--bg); }
  .dtab .stopped { font-size:.62rem; text-transform:uppercase; letter-spacing:.03em;
                   color:var(--danger); border:1px solid var(--danger); border-radius:3px;
                   padding:0 .25rem; opacity:.85; }
  #logpanes { flex:1; overflow:hidden; position:relative; }
  .pane { position:absolute; inset:0; overflow:auto; margin:0; padding:.5rem .8rem;
          font:0.72rem/1.5 ui-monospace,monospace; white-space:pre-wrap; word-break:break-all;
          display:none; }
  .pane.act { display:block; }
  .pane.err { color:var(--danger); }
</style>
</head>
<body>
<h1>margay <small>— worktree sandboxes</small></h1>
<div id="cols">
  <nav id="sidebar"><div class="empty">loading…</div></nav>
  <div id="detail">
    <div id="summary"><div class="empty">select a worktree</div></div>
    <div id="divider"></div>
    <div id="logarea">
      <div id="logtabs"></div>
      <div id="logpanes"></div>
    </div>
  </div>
</div>
<script>
"use strict";
const esc = s => String(s).replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const jsq = s => esc(String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\u0027").replace(/"/g, '\\u0022'));

const busy = new Set();
let lastState = {projects: []};
let selected = localStorage.getItem('margaySelected') || null;

// per-worktree tab state: wtPath -> { tabs: Map(key -> tab), active: key }
// tab: {kind:'log'|'cmd', title, logPath?, offset, buf, follow, err, meta:[{text,href?}]}
const wtTabs = new Map();
function tabsFor(wt) {
  if (!wtTabs.has(wt)) wtTabs.set(wt, { tabs: new Map(), active: null });
  return wtTabs.get(wt);
}

const logarea = document.getElementById('logarea');
const logtabs = document.getElementById('logtabs');
const logpanes = document.getElementById('logpanes');
// default: logarea flex-fills the window; an explicit height exists only after a drag
const storedLogH = parseInt(localStorage.getItem('margayLogH'), 10);
if (storedLogH) { logarea.style.flex = 'none'; logarea.style.height = storedLogH + 'px'; }

function findWt(path) {
  for (const p of lastState.projects || [])
    for (const wt of p.worktrees || [])
      if (wt.path === path) return { p, wt };
  return null;
}

function defaultSelection() {
  let first = null;
  for (const p of lastState.projects || [])
    for (const wt of p.worktrees || []) {
      first = first || wt.path;
      if (wt.services.length) return wt.path;
    }
  return first;
}

function selectWt(path) {
  selected = path;
  localStorage.setItem('margaySelected', path);
  render();
}

// keep the selected worktree's tabs in sync with its running services
function syncTabs(wt) {
  const st = tabsFor(wt.path);
  // Stopped services keep a (frozen) log tab so you can read why they went
  // down — live ones win when the same service appears in both lists.
  const logSvcs = [...wt.services, ...(wt.stoppedServices || [])];
  const wanted = new Set(logSvcs.map(s => 'log:' + s.service));
  for (const key of [...st.tabs.keys()])
    if (key.startsWith('log:') && !wanted.has(key)) {
      st.tabs.delete(key);
      const pre = logpanes.querySelector('pre[data-key="' + CSS.escape(wt.path + '|' + key) + '"]');
      if (pre) pre.remove();
    }
  for (const s of logSvcs) {
    const key = 'log:' + s.service;
    if (!st.tabs.has(key) && s.log) {
      st.tabs.set(key, { kind:'log', title: s.service, logPath: s.log,
                         offset:-1, buf:'', follow:true, err:false, stopped: !!s.stopped });
    } else if (st.tabs.has(key)) {
      const t = st.tabs.get(key);
      if (t.logPath !== s.log) { t.logPath = s.log; t.offset = -1; t.buf = ''; }
      t.stopped = !!s.stopped;
    }
  }
  if (!st.active || !st.tabs.has(st.active)) st.active = st.tabs.keys().next().value || null;
}

function paneFor(wt, key) {
  const id = wt + '|' + key;
  let pre = logpanes.querySelector('pre[data-key="' + CSS.escape(id) + '"]');
  if (!pre) {
    pre = document.createElement('pre');
    pre.className = 'pane';
    pre.dataset.key = id;
    logpanes.appendChild(pre);
  }
  return pre;
}

function renderTabs() {
  const st = selected ? tabsFor(selected) : null;
  logtabs.innerHTML = '';
  if (!st) return;
  if (st.active) paneFor(selected, st.active);
  for (const pre of logpanes.querySelectorAll('.pane'))
    pre.classList.toggle('act', pre.dataset.key === selected + '|' + (st.active || ''));
  for (const [key, t] of st.tabs) {
    const el = document.createElement('span');
    el.className = 'dtab' + (key === st.active ? ' act' : '');
    el.innerHTML = esc(t.title) +
      (t.kind === 'log' && t.stopped ? ' <span class="stopped" title="process not running — last log">stopped</span>' : '') +
      (t.kind === 'cmd' ? ' <span class="close" title="close">✕</span>' : '') +
      (t.kind === 'log'
        ? ' <label style="font-size:.68rem"><input type="checkbox" ' + (t.follow ? 'checked' : '') + '> follow</label>'
        : '');
    el.addEventListener('click', e => {
      if (e.target.classList && e.target.classList.contains('close')) {
        st.tabs.delete(key);
        const pre = logpanes.querySelector('pre[data-key="' + CSS.escape(selected + '|' + key) + '"]');
        if (pre) pre.remove();
        if (st.active === key) st.active = st.tabs.keys().next().value || null;
        renderTabs(); return;
      }
      if (e.target.type === 'checkbox') { t.follow = e.target.checked; return; }
      st.active = key; renderTabs();
    });
    logtabs.appendChild(el);
  }
  const t = st.tabs.get(st.active);
  const pre = t && paneFor(selected, st.active);
  if (pre && t) { pre.textContent = t.buf; pre.classList.toggle('err', !!t.err); if (t.follow) pre.scrollTop = pre.scrollHeight; }
}

async function pollLogs() {
  if (!selected) return;
  const sel = selected;
  const st = tabsFor(sel);
  for (const [key, t] of st.tabs) {
    if (t.kind !== 'log') continue;
    try {
      const r = await fetch('/api/log?file=' + encodeURIComponent(t.logPath) + '&offset=' + t.offset);
      if (sel !== selected) return;
      if (r.status !== 200) continue;
      const data = await r.json();
      if (sel !== selected) return;
      if (data.offset < t.offset) t.buf = data.data; else t.buf += data.data;
      if (t.buf.length > 262144) t.buf = t.buf.slice(-262144);
      t.offset = data.offset;
      const pre = paneFor(sel, key);
      if (data.data || pre.textContent === '') {
        const stick = t.follow;
        pre.textContent = t.buf;
        if (stick && key === st.active) pre.scrollTop = pre.scrollHeight;
      }
    } catch (e) { /* next tick */ }
  }
}

// divider resize
(() => {
  const divider = document.getElementById('divider');
  let drag = null;
  divider.addEventListener('mousedown', e => { drag = { y: e.clientY, h: logarea.offsetHeight }; e.preventDefault(); });
  window.addEventListener('mousemove', e => {
    if (!drag) return;
    const h = Math.min(window.innerHeight * 0.8, Math.max(80, drag.h + (drag.y - e.clientY)));
    logarea.style.flex = 'none';
    logarea.style.height = h + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (drag) localStorage.setItem('margayLogH', String(logarea.offsetHeight));
    drag = null;
  });
})();

async function api(path, body) {
  const opts = body === undefined ? {} :
    { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) };
  const r = await fetch(path, opts);
  let data = {};
  try { data = await r.json(); } catch (e) { /* keep {} */ }
  return { status: r.status, data };
}

async function refresh() {
  try {
    const { data } = await api('/api/state');
    lastState = data;
    render();
  } catch (e) { /* server gone; keep last view */ }
}

function openCmd(wt, text, err) {
  const st = tabsFor(wt);
  const t = st.tabs.get('cmd') || { kind:'cmd', title:'command', buf:'', follow:false, err:false, meta:[] };
  t.buf = text; t.err = !!err;
  st.tabs.set('cmd', t);
  st.active = 'cmd';
  if (selected !== wt) selectWt(wt); else renderTabs();
}

async function act(cmd, wt, extra) {
  busy.add(wt); render();
  openCmd(wt, '… running margay ' + cmd + (extra && extra.service ? ' ' + extra.service : ''), false);
  try {
    const { data } = await api('/api/' + cmd, Object.assign({ worktreePath: wt }, extra || {}));
    openCmd(wt, data.output || '(no output)', !data.ok);
  } catch (e) {
    openCmd(wt, 'request failed: ' + e, true);
  } finally {
    busy.delete(wt);
  }
  await refresh();
}

// --- dependency pairing (ui v4) ---
// pendingPick = {wt, svc, po, cands} while the picker awaits a choice
let pendingPick = null;

function regByPrimary(primary) {
  return (lastState.projects || []).find(p => p.primaryPath === primary) || null;
}

async function actUp(wtPath, svcName, primary) {
  const reg = regByPrimary(primary);
  const sv = reg && reg.conf ? (reg.conf.services || []).find(s => s.name === svcName) : null;
  if (!sv || !(sv.needs || sv.usesProject)) return act('up', wtPath, { service: svcName });
  let po = null;
  try {
    po = (await api('/api/pair-options?primary=' + encodeURIComponent(primary) +
                    '&service=' + encodeURIComponent(svcName))).data;
  } catch (e) { /* fall through to plain up */ }
  if (!po || !po.dep) return act('up', wtPath, { service: svcName });
  const cands = po.candidates || [];
  if (cands.length === 1)
    return act('up', wtPath, { service: svcName, use: { name: po.dep, value: String(cands[0].port) } });
  if (!cands.length && !po.optional)
    return act('up', wtPath, { service: svcName });   // engine reports "start it first"
  pendingPick = { wt: wtPath, svc: svcName, po, cands };
  selectWt(wtPath);
}

function pickPair(value) {
  const pp = pendingPick; pendingPick = null;
  act('up', pp.wt, { service: pp.svc, use: { name: pp.po.dep, value } });
}

function cancelPick() { pendingPick = null; render(); }

function renderPicker(el, wt) {
  const { svc, po, cands } = pendingPick;
  const rows = cands.map(c =>
    '<button onclick="pickPair(\'' + jsq(String(c.port)) + '\')">' +
    esc(c.worktree) + ' · :' + esc(c.port) + '</button>');
  if (po.optional)
    rows.push('<button onclick="pickPair(\'none\')">mock mode — no ' + esc(po.dep) + '</button>');
  if (!cands.length && po.mainPort)
    rows.push('<button onclick="pickPair(\'' + jsq(String(po.mainPort)) + '\')">main (:' + esc(po.mainPort) + ')</button>');
  el.innerHTML =
    '<h2>' + esc(wt.isPrimary ? 'primary' : wt.name) + '</h2>' +
    '<div class="branch">pair <b>' + esc(svc) + '</b> with which <b>' + esc(po.dep) + '</b>?</div>' +
    '<div class="pickrows">' + rows.join('') + '</div>' +
    '<button onclick="cancelPick()">cancel</button>';
}

async function unregister(p) {
  try { await api('/api/unregister', { primaryPath: p }); } catch (e) { /* refresh shows reality */ }
  await refresh();
}

function actButton(wt, mini) {
  if (busy.has(wt.path)) return '<span class="spin">working…</span>';
  const cls = (wt.services.length ? 'down' : 'up') + (mini ? ' mini' : '');
  const cmd = wt.services.length ? 'down' : 'up';
  return '<button class="' + cls + '" onclick="event.stopPropagation(); act(\'' + cmd + '\',\'' + jsq(wt.path) + '\')">' + cmd + '</button>';
}

function svcButton(wt, sv, reg) {
  if (busy.has(wt.path)) return '<span class="spin">working…</span>';
  if (wt.services.some(s => s.service === sv.name))
    return '<button class="down mini" onclick="event.stopPropagation(); act(\'down\',\'' + jsq(wt.path) + '\')">down</button>';
  return '<button class="up mini" onclick="event.stopPropagation(); actUp(\'' + jsq(wt.path) +
         '\',\'' + jsq(sv.name) + '\',\'' + jsq(reg.primaryPath) + '\')">up</button>';
}

const basename = p => String(p || '').replace(/\/+$/, '').split('/').pop();

// sidebar tree: project → service (one node per declared service of each
// registered repo; registrations merge under their project name) → worktree
function renderSidebar() {
  const el = document.getElementById('sidebar');
  const ps = lastState.projects || [];
  const groups = new Map();
  for (const p of ps) {
    if (!groups.has(p.project)) groups.set(p.project, []);
    groups.get(p.project).push(p);
  }
  // Empty-projects message still falls through to static routes below.
  let html = ps.length ? ''
    : '<div class="empty">no projects yet — run <code>margay up</code> in a repo</div>';
  for (const [name, regs] of groups) {
    html += '<div class="proj-h"><b>' + esc(name) + '</b></div>';
    for (const reg of regs) {
      const svcs = (reg.conf && reg.conf.services && reg.conf.services.length)
        ? reg.conf.services : [null];   // null: conf unreadable — single fallback node
      svcs.forEach((sv, si) => {
        const label = sv ? sv.name : basename(reg.primaryPath) || reg.project;
        html += '<div class="svc-h" title="' + esc(reg.primaryPath) + '">' + esc(label) +
          (reg.exists ? '' : ' <span class="badge">missing</span>') +
          (si === 0 ? '<button class="x" title="remove this repo from the list (re-appears on next up)" ' +
                      'onclick="unregister(\'' + jsq(reg.primaryPath) + '\')">✕</button>' : '') +
          '</div>';
        if (!reg.exists) return;
        const depName = sv ? (sv.needs || (sv.usesProject || '').split(':')[1] || '') : '';
        for (const wt of reg.worktrees) {
          const inst = sv ? wt.services.find(s => s.service === sv.name) : null;
          const running = sv ? !!inst : wt.services.length > 0;
          let pair = '';
          if (inst && inst.uses) {
            const m = String(inst.uses).match(/:(\d+)\/?$/);
            if (m) pair = ' <span class="pair">→ ' + esc(depName || 'dep') + ' :' + m[1] + '</span>';
          }
          html += '<div class="wt-row' + (wt.path === selected ? ' sel' : '') +
            '" onclick="selectWt(\'' + jsq(wt.path) + '\')">' +
            '<span class="dot' + (running ? ' on' : '') + '"></span>' +
            '<b>' + esc(wt.isPrimary ? 'primary' : wt.name) + pair + '</b>' +
            (sv ? svcButton(wt, sv, reg) : actButton(wt, true)) + '</div>';
        }
      });
    }
  }
  const sr = lastState.staticRoutes || [];
  if (sr.length) {
    html += '<div class="proj-h"><b>static routes</b></div>';
    for (const r of sr) {
      const attr = r.url ? ' onclick="window.open(\'' + jsq(r.url) + '\',\'_blank\')"' : '';
      html += '<div class="wt-row"' + attr + ' title="' + esc(r.note || r.host) + '">' +
        '<span class="dot' + (r.live ? ' on' : '') + '"></span>' +
        '<b>' + esc(r.label) + '</b>' +
        '<span class="pair">→ :' + r.port + '</span></div>';
    }
  }
  el.innerHTML = html;
}

function summaryButton(p, wt) {
  if (busy.has(wt.path)) return '<span class="spin">working…</span>';
  const svcs = (p.conf && p.conf.services) || [];
  if (!wt.services.length && svcs.length === 1 && (svcs[0].needs || svcs[0].usesProject))
    return '<button class="up" onclick="actUp(\'' + jsq(wt.path) + '\',\'' + jsq(svcs[0].name) +
           '\',\'' + jsq(p.primaryPath) + '\')">up</button>';
  return actButton(wt, false);
}

function renderSummary() {
  const el = document.getElementById('summary');
  const hit = selected && findWt(selected);
  if (!hit) { el.innerHTML = '<div class="empty">select a worktree</div>'; return; }
  const { p, wt } = hit;
  if (pendingPick && pendingPick.wt === wt.path) { renderPicker(el, wt); return; }
  const rows = [];
  if (wt.url) rows.push(['root', '<a href="' + esc(wt.url) + '" target="_blank" rel="noopener">' + esc(wt.url) + '</a>']);
  else if (!wt.services.length && wt.hintUrl) rows.push(['root', '<span class="hint">' + esc(wt.hintUrl) + ' (not running)</span>']);
  for (const s of wt.services)
    rows.push([esc(s.service), '<a href="' + esc(s.url) + '" target="_blank" rel="noopener">' + esc(s.url) + '</a>']);
  const meta = wt.services.map(s =>
    esc(s.service) + ': pid ' + esc(s.pid) + (s.dbName ? ' · db ' + esc(s.dbName) : '')).join('  ·  ');
  el.innerHTML =
    '<h2>' + esc(wt.isPrimary ? 'primary' : wt.name) + ' ' + summaryButton(p, wt) + '</h2>' +
    '<div class="branch">' + esc(wt.branch) + '</div>' +
    '<div class="path">' + esc(wt.path) + '</div>' +
    (wt.collision ? '<div class="badge">slug collision — port links only</div>' : '') +
    (rows.length ? '<div class="urls">' + rows.map(r => '<span class="k">' + r[0] + '</span><span>' + r[1] + '</span>').join('') + '</div>' : '') +
    (meta ? '<div class="meta">' + meta + '</div>' : '');
}

function render() {
  if (!selected || !findWt(selected)) selected = defaultSelection();
  renderSidebar();
  renderSummary();
  const hit = selected && findWt(selected);
  if (hit) syncTabs(hit.wt);
  renderTabs();
}

refresh();
setInterval(refresh, 2000);
setInterval(pollLogs, 1500);
</script>
</body>
</html>
